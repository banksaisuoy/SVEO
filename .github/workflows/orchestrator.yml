name: Jules Pipeline Controller

on:
  schedule:
    - cron: '0 6,8,10,12,14,16,18,20,22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: pipeline or sync
        required: false
        default: pipeline

concurrency:
  group: jules-pipeline
  cancel-in-progress: false

env:
  JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
  NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  WASABI_ACCESS_KEY: ${{ secrets.WASABI_ACCESS_KEY }}
  WASABI_SECRET_KEY: ${{ secrets.WASABI_SECRET_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  PYTHONUNBUFFERED: '1'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install z-ai CLI
        run: |
          npm install -g z-ai-web-dev-sdk || true
          echo '{"baseUrl":"https://internal-api.z.ai/v1","apiKey":"z-ai","token":"placeholder","userId":"github-actions"}' | sudo tee /etc/.z-ai-config > /dev/null
      - name: Install deps
        run: pip install --break-system-packages psycopg2-binary boto3 || true
      - name: Sync
        run: cd .github/jules-v3/ && python3 sync_sessions.py || true
      - name: Pipeline
        if: github.event.inputs.mode != 'sync'
        run: cd .github/jules-v3/ && python3 pipeline_v7.py || true
      - name: Sync after
        if: always()
        run: cd .github/jules-v3/ && python3 sync_sessions.py || true

<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Settings</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&display=swap');
        :root {
            --primary: #0b5dbb;
        }
        body {
            font-family: 'Noto Sans Thai', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #111827;
            color: #d1d5db;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        body.light-theme {
            background-color: #f9fafb;
            color: #1f2937;
        }

        .glass-panel {
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        body.light-theme .glass-panel {
             background: rgba(255, 255, 255, 0.8);
             border: 1px solid rgba(0, 0, 0, 0.05);
             box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast-success { background: linear-gradient(to right, #059669, #10b981); }
        .toast-error { background: linear-gradient(to right, #dc2626, #ef4444); }

        /* Custom toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #68D391;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #68D391;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="min-h-screen flex flex-col items-center pt-12 px-4">

    <!-- Preview Header -->
    <header id="preview-header" class="w-full max-w-2xl flex items-center justify-between p-4 mb-8 rounded-xl glass-panel animate-fade-in" style="border-left: 4px solid var(--primary)">
        <h1 id="preview-title" class="text-2xl font-bold tracking-wide">VISIONHUB</h1>
        <a href="/" class="text-sm px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>Back to Site
        </a>
    </header>

    <main class="w-full max-w-2xl glass-panel rounded-2xl p-8">
        <div class="mb-8 border-b border-gray-700 pb-4">
            <h2 class="text-3xl font-bold">Dashboard Settings</h2>
            <p class="text-gray-400 mt-2 text-sm">Customize the appearance of your website.</p>
        </div>

        <form id="settings-form" class="space-y-6">
            <!-- Website Title -->
            <div class="space-y-2">
                <label for="setting-title" class="block text-sm font-medium">Website Title</label>
                <input type="text" id="setting-title" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Enter website title">
            </div>

            <!-- Primary Color -->
            <div class="space-y-2">
                <label for="setting-primary" class="block text-sm font-medium">Primary Color</label>
                <div class="flex items-center space-x-4">
                    <input type="color" id="setting-primary" class="h-12 w-20 rounded cursor-pointer bg-transparent border-0 p-0">
                    <input type="text" id="setting-primary-text" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-mono" placeholder="#0b5dbb">
                </div>
            </div>

            <!-- Theme Toggle -->
            <div class="flex items-center justify-between py-4 border-t border-b border-gray-700">
                <div>
                    <h3 class="text-sm font-medium">Dark Theme</h3>
                    <p class="text-xs text-gray-400">Toggle between light and dark mode for the site.</p>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="setting-theme" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" checked/>
                    <label for="setting-theme" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-400 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex justify-end pt-4">
                <button type="submit" id="save-settings-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-6 py-3 rounded-lg transition-colors shadow-lg shadow-blue-500/30 flex items-center">
                    <i class="fas fa-save mr-2"></i> Save Changes
                </button>
            </div>
        </form>
    </main>

    <div id="toast-container"></div>

    <script src="settings.js"></script>
</body>
</html>
